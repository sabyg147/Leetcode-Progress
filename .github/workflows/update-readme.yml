name: Update README

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read stats.json
        id: stats
        run: |
          SOLVED=$(python3 -c "import json;print(json.load(open('stats.json'))['leetcode']['solved'])")
          EASY=$(python3 -c "import json;print(json.load(open('stats.json'))['leetcode']['easy'])")
          MEDIUM=$(python3 -c "import json;print(json.load(open('stats.json'))['leetcode']['medium'])")
          HARD=$(python3 -c "import json;print(json.load(open('stats.json'))['leetcode']['hard'])")

          PERCENT=$((SOLVED*100/1000))

          FILLED=$((PERCENT/10))
          EMPTY=$((10-FILLED))

          BAR=$(printf '█%.0s' $(seq 1 $FILLED))
          SPACE=$(printf '░%.0s' $(seq 1 $EMPTY))

          echo "SOLVED=$SOLVED" >> $GITHUB_ENV
          echo "EASY=$EASY" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "HARD=$HARD" >> $GITHUB_ENV
          echo "BAR=$BAR$SPACE $PERCENT%" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s/<!--SOLVED-->.*<!--SOLVED-->/<!--SOLVED-->$SOLVED<!--SOLVED-->/" README.md
          sed -i "s/<!--EASY-->.*<!--EASY-->/<!--EASY-->$EASY<!--EASY-->/" README.md
          sed -i "s/<!--MEDIUM-->.*<!--MEDIUM-->/<!--MEDIUM-->$MEDIUM<!--MEDIUM-->/" README.md
          sed -i "s/<!--HARD-->.*<!--HARD-->/<!--HARD-->$HARD<!--HARD-->/" README.md
          sed -i "/<!--PROGRESS-->/, /<!--PROGRESS-->/c\\<!--PROGRESS-->\\
\`\`\`text\\
$BAR\\
\`\`\`\\
<!--PROGRESS-->" README.md

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md

          git diff --cached --quiet || git commit -m "Update README"

          git push
